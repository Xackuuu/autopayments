databaseChangeLog:
  - changeSet:
      id: 1
      author: xackuuu
      changes:
        - createTable:
            tableName: autopay_rule
            schemaName: public
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_autopay_rule
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: recipient_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: cron_expression
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_executed_at
                  type: TIMESTAMP
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_autopay_rule_user_id
            tableName: autopay_rule
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_autopay_rule_enabled
            tableName: autopay_rule
            columns:
              - column:
                  name: enabled